<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <title>redirecting...</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
        <meta http-equiv="refresh" content="2.5;url={{ url|e }}">
        <!-- favicon -->
        <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon/favicon-96x96.png') }}" sizes="96x96" />
        <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon/favicon.svg') }}" />
        <link rel="shortcut icon" href="{{ url_for('static', filename='favicon/favicon.ico') }}" />
        <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='favicon/apple-touch-icon.png') }}" />
        <link rel="manifest" href="{{ url_for('static', filename='favicon/site.webmanifest') }}" />
        <!-- embed -->
        <meta property="og:title" content="hack this url" />
        <meta property="og:description" content="redirecting to {{ url }}" />
        <meta property="og:image" content="https://hackthis.club/" />
        <meta name="theme-color" content="#FF6F6F" />
    </head>
    <body>
        <main>
            <h1>redirecting...</h1>
            <p>sending you to: <a href="{{ url|e }}" rel="noopener noreferrer">{{ url }}</a></p>
            <p>if you aren't redirected, click the link above!</p>
        </main>

        <footer>
            <p><b>made by evan.</b></p>
            <a href="https://consciousb.one/"><img src="https://consciousb.one/assets/88x31/cbone.png" height="31"></a>
            <a href="https://hackclub.com"><img src="https://consciousb.one/assets/88x31/hc.png"></a>
        </footer>

        <script>
            setTimeout(() => { // wait
                window.location.replace("{{ url }}");
            }, 2000);
        </script>
    </body>
</html>
